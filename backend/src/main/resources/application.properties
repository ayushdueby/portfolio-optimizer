spring.application.name=portfolio-optimizer-backend

spring.data.mongodb.uri=mongodb://localhost:27017/portfolio_optimizer

server.port=8080

# Set via env ANTHROPIC_API_KEY or in application-local.properties (not committed)
anthropic.api.key=${ANTHROPIC_API_KEY:}
